{% extends 'base.html' %}
{% load static %} 
{% block title %}Registro de comidas{% endblock %}
{% block styles %}
<!-- DATATABLE -->
<link
    rel="stylesheet"
    href="//cdn.datatables.net/2.3.3/css/dataTables.dataTables.min.css"
/>
<link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.dataTables.min.css">
<!-- FLATPICKR -->
<link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
/>
<!-- ESTILOS EXTRA -->
<style>
    .btn-check:checked + .btn {
        background-color: var(--bs-primary);
        color: #fff;
    }

    .btn-check:not(:checked) + .btn {
        background-color: var(--bs-secondary);
        color: #fff;
    }
    
    #registroTable {
        color: #9da67a;
        background-color: #1a3027;
    }

    /* Estilo base (similar a .form-control de Bootstrap) */
    .custom-control {
        display: block;
        width: 100%;
        padding: 0.5rem 2.25rem 0.5rem 0.75rem; /* espacio a derecha para el chevron */
        font-size: 1rem;
        line-height: 1.5;
        color: #9da67a; /* texto */
        background-color: #213726 !important; /* fondo */
        background-clip: padding-box;
        border: 1px solid #ced4da; /* borde */
        border-radius: 0.375rem;
        transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        cursor: pointer;
    }

    .custom-control:hover {
        border-color: #9da67a;
    }

    /* Focus */
    .custom-control:focus {
        color: #9da67a;
        background-color: #213726;
        border-color: #86b7fe; /* borde azul */
        outline: 0;
        box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25); /* glow */
    }
    .custom-control::-webkit-calendar-picker-indicator {
        filter: invert(30%) sepia(60%) saturate(500%) hue-rotate(180deg);
        cursor: pointer;
    }
</style>
{% endblock %} 
{% block content %}
<div class="container">
    <div class="card">
        <div
            class="card-header d-md-flex justify-content-between align-items-center"
        >
            <div class="d-flex d-md-block flex-column align-items-center mb-2">
                
            </div>
            
        </div>
        <div class="card-body">
            <div>
                <div class="row mb-3">
                    <div class="col-md-4 mb-2">
                        <input
                            type="date"
                            id="filtroFecha"
                            class="custom-control"
                        />
                    </div>
                </div>
            </div>
            <div>
                <table
                    id="registroTable"
                    class="table"
                    data-url="{% url 'registro_app:datatable' %}"
                >
                    <thead>
                        <tr>
                            <th>Fecha y Hora</th>
                            <th>Apellido</th>
                            <th>Nombre</th>
                            <th>Documento</th>
                            <th>Casino</th>
                            <th>Comida</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

{% endblock %} 
{% block scripts %}
<!-- DATATABLE -->
<script src="//cdn.datatables.net/2.3.3/js/dataTables.min.js"></script>
<script src="{% static 'js/registro-datatable.js' %}"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
<script src="https://cdn.datatables.net/responsive/3.0.7/js/dataTables.responsive.min.js"></script>
<script src="https://cdn.datatables.net/buttons/3.2.5/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/3.2.5/js/buttons.html5.min.js"></script>
<!-- FONTAWESOME -->
<script src="https://kit.fontawesome.com/06f507be24.js" crossorigin="anonymous"></script>
{% endblock %}
